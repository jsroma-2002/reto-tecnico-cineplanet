services:
  # ──────────────── Frontend ────────────────
  cinema-frontend:
    build:
      context: ./webapp-cineplanet
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
        VITE_CANDYSTORE_API_URL: http://localhost:8081
        VITE_COMPLETE_API_URL: http://localhost:8082
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    ports:
      - "3000:80"
    depends_on:
      - premieres-service
      - candystore-service
      - complete-service
    networks:
      - cinema-network
    restart: unless-stopped

  # ──────────────── Microservicios ────────────────
  premieres-service:
    build:
      context: ./premieres-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongo:27017/premieres
      ENABLE_SEED_ENDPOINT: "true"
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - cinema-network
    restart: unless-stopped

  candystore-service:
    build:
      context: ./candystore-service
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cinema?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      ENABLE_SEED_ENDPOINT: "true"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cinema-network
    restart: unless-stopped

  complete-service:
    build:
      context: ./complete-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cinema?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cinema-network
    restart: unless-stopped

  # ──────────────── Bases de datos ────────────────
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cinema-network
    restart: unless-stopped

  mysql:
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cinema
    volumes:
      - mysql-data:/var/lib/mysql
      - ./candystore-service/init.sql:/docker-entrypoint-initdb.d/01-candystore.sql
      - ./complete-service/init.sql:/docker-entrypoint-initdb.d/02-complete.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cinema-network
    restart: unless-stopped

networks:
  cinema-network:
    driver: bridge

volumes:
  mongo-data:
  mysql-data:
